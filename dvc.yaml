stages:
  # Stage 1: Create clean manifests for each language
  create_manifest:
    foreach: ${languages}
    do:
      cmd: python scripts/create_manifest.py
        --raw-dir ${data_dir}/raw
        --lang ${item}
        --output ${manifest_dir}/${item}/clean.jsonl
      deps:
        - scripts/create_manifest.py
        - ${data_dir}/raw/${item}/wav
        - ${data_dir}/raw/${item}/transcripts.txt
      outs:
        - ${manifest_dir}/${item}/clean.jsonl

  # Stage 2: Add noise at different SNR levels for en
  add_noise_en_20:
    cmd: python scripts/add_noise.py
      --input-manifest ${manifest_dir}/en/clean.jsonl
      --output-manifest ${manifest_dir}/en/snr_20.jsonl
      --snr-db 20
      --noisy-dir ${noisy_dir}
      --seed ${seed}
    deps:
      - scripts/add_noise.py
      - ${manifest_dir}/en/clean.jsonl
    params:
      - seed
    outs:
      - ${manifest_dir}/en/snr_20.jsonl
      - ${noisy_dir}/en/snr_20.0

  add_noise_en_10:
    cmd: python scripts/add_noise.py
      --input-manifest ${manifest_dir}/en/clean.jsonl
      --output-manifest ${manifest_dir}/en/snr_10.jsonl
      --snr-db 10
      --noisy-dir ${noisy_dir}
      --seed ${seed}
    deps:
      - scripts/add_noise.py
      - ${manifest_dir}/en/clean.jsonl
    params:
      - seed
    outs:
      - ${manifest_dir}/en/snr_10.jsonl
      - ${noisy_dir}/en/snr_10.0

  add_noise_en_0:
    cmd: python scripts/add_noise.py
      --input-manifest ${manifest_dir}/en/clean.jsonl
      --output-manifest ${manifest_dir}/en/snr_0.jsonl
      --snr-db 0
      --noisy-dir ${noisy_dir}
      --seed ${seed}
    deps:
      - scripts/add_noise.py
      - ${manifest_dir}/en/clean.jsonl
    params:
      - seed
    outs:
      - ${manifest_dir}/en/snr_0.jsonl
      - ${noisy_dir}/en/snr_0.0

  add_noise_en_-10:
    cmd: python scripts/add_noise.py
      --input-manifest ${manifest_dir}/en/clean.jsonl
      --output-manifest ${manifest_dir}/en/snr_-10.jsonl
      --snr-db -10
      --noisy-dir ${noisy_dir}
      --seed ${seed}
    deps:
      - scripts/add_noise.py
      - ${manifest_dir}/en/clean.jsonl
    params:
      - seed
    outs:
      - ${manifest_dir}/en/snr_-10.jsonl
      - ${noisy_dir}/en/snr_-10.0

  # Stage 3: Run inference on clean audio
  inference_clean:
    foreach: ${languages}
    do:
      cmd: python scripts/inference.py
        --input-manifest ${manifest_dir}/${item}/clean.jsonl
        --output-manifest ${predictions_dir}/${item}/clean.jsonl
        --model-name ${model_name}
      deps:
        - scripts/inference.py
        - ${manifest_dir}/${item}/clean.jsonl
      params:
        - model_name
      outs:
        - ${predictions_dir}/${item}/clean.jsonl

  # Stage 4: Run inference on noisy audio
  inference_noisy_en_20:
    cmd: python scripts/inference.py
      --input-manifest ${manifest_dir}/en/snr_20.jsonl
      --output-manifest ${predictions_dir}/en/snr_20.jsonl
      --model-name ${model_name}
    deps:
      - scripts/inference.py
      - ${manifest_dir}/en/snr_20.jsonl
    params:
      - model_name
    outs:
      - ${predictions_dir}/en/snr_20.jsonl

  inference_noisy_en_10:
    cmd: python scripts/inference.py
      --input-manifest ${manifest_dir}/en/snr_10.jsonl
      --output-manifest ${predictions_dir}/en/snr_10.jsonl
      --model-name ${model_name}
    deps:
      - scripts/inference.py
      - ${manifest_dir}/en/snr_10.jsonl
    params:
      - model_name
    outs:
      - ${predictions_dir}/en/snr_10.jsonl

  inference_noisy_en_0:
    cmd: python scripts/inference.py
      --input-manifest ${manifest_dir}/en/snr_0.jsonl
      --output-manifest ${predictions_dir}/en/snr_0.jsonl
      --model-name ${model_name}
    deps:
      - scripts/inference.py
      - ${manifest_dir}/en/snr_0.jsonl
    params:
      - model_name
    outs:
      - ${predictions_dir}/en/snr_0.jsonl

  inference_noisy_en_-10:
    cmd: python scripts/inference.py
      --input-manifest ${manifest_dir}/en/snr_-10.jsonl
      --output-manifest ${predictions_dir}/en/snr_-10.jsonl
      --model-name ${model_name}
    deps:
      - scripts/inference.py
      - ${manifest_dir}/en/snr_-10.jsonl
    params:
      - model_name
    outs:
      - ${predictions_dir}/en/snr_-10.jsonl

  # Stage 5: Evaluate clean audio
  evaluate_clean:
    foreach: ${languages}
    do:
      cmd: python scripts/evaluate.py
        --input-manifest ${predictions_dir}/${item}/clean.jsonl
        --output-metrics ${metrics_dir}/${item}/clean.json
      deps:
        - scripts/evaluate.py
        - ${predictions_dir}/${item}/clean.jsonl
      metrics:
        - ${metrics_dir}/${item}/clean.json:
            cache: false

  # Stage 6: Evaluate noisy audio
  evaluate_noisy_en_20:
    cmd: python scripts/evaluate.py
      --input-manifest ${predictions_dir}/en/snr_20.jsonl
      --output-metrics ${metrics_dir}/en/snr_20.json
    deps:
      - scripts/evaluate.py
      - ${predictions_dir}/en/snr_20.jsonl
    metrics:
      - ${metrics_dir}/en/snr_20.json:
          cache: false

  evaluate_noisy_en_10:
    cmd: python scripts/evaluate.py
      --input-manifest ${predictions_dir}/en/snr_10.jsonl
      --output-metrics ${metrics_dir}/en/snr_10.json
    deps:
      - scripts/evaluate.py
      - ${predictions_dir}/en/snr_10.jsonl
    metrics:
      - ${metrics_dir}/en/snr_10.json:
          cache: false

  evaluate_noisy_en_0:
    cmd: python scripts/evaluate.py
      --input-manifest ${predictions_dir}/en/snr_0.jsonl
      --output-metrics ${metrics_dir}/en/snr_0.json
    deps:
      - scripts/evaluate.py
      - ${predictions_dir}/en/snr_0.jsonl
    metrics:
      - ${metrics_dir}/en/snr_0.json:
          cache: false

  evaluate_noisy_en_-10:
    cmd: python scripts/evaluate.py
      --input-manifest ${predictions_dir}/en/snr_-10.jsonl
      --output-metrics ${metrics_dir}/en/snr_-10.json
    deps:
      - scripts/evaluate.py
      - ${predictions_dir}/en/snr_-10.jsonl
    metrics:
      - ${metrics_dir}/en/snr_-10.json:
          cache: false

  # Stage 7: Plot results
  plot_results:
    cmd: python scripts/plot_results.py
      --metrics-dir ${metrics_dir}
      --output ${plots_dir}/per_vs_snr.png
    deps:
      - scripts/plot_results.py
    params:
      - languages
      - snr_levels
    plots:
      - ${plots_dir}/per_vs_snr.png:
          cache: false
